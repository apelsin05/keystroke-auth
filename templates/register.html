<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inregistrare</title>
  <meta name="description" content="Pagina de inregistrare." />
  <link rel="stylesheet" href="../static/css/style.css" />
</head>
<body>

  <div class="container">

    <div class="left-section">
      <h1 class="left-title">Creeaza-ti un cont:</h1>
    </div>

    <div class="right-section">
      <form method="POST" action="/register/step1">

        <div class="form-row">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="popescu@domeniu.com (.ro, .gr, etc)" required />
        </div>

        <div class="form-row">
          <label for="password">Parola</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Introdu parola" required />
            <span class="toggle-password" onclick="togglePassword('password', this)">👁</span>
          </div>
        </div>

        <!-- live password constraint list -->
        <div class="form-row constraints-row">
          <ul class="constraints" id="constraints">
            <li id="c-length">* Minim 8 caractere</li>
            <li id="c-upper">* O litera mare</li>
            <li id="c-lower">* O litera mica</li>
            <li id="c-digit">* O cifra</li>
            <li id="c-special">* Un caracter special (!@#$...)</li>
          </ul>
        </div>

        <div class="form-row">
          <label for="confirm-password">Confirma parola</label>
          <div class="password-wrapper">
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirma parola" required />
            <span class="toggle-password" onclick="togglePassword('confirm-password', this)">👁</span>
          </div>
        </div>

        <!-- hidden field: datele legate de keystroke vor fi trimise aici de js inainte de submit -->
        <input type="hidden" id="keystrokes_data" name="keystrokes_data" />

        <div class="form-footer">
          <span class="auth-link">Ai deja cont? <a href="/login">Autentifica-te</a></span>
          <button type="submit" id="submit-btn" disabled>Urmatorul →</button>
        </div>

      </form>
    </div>

  </div>

  <script src="../static/js/keystroke_capture.js"></script>

  <script>
    // password show/hide toggle
    function togglePassword(fieldId, icon) {
      const field = document.getElementById(fieldId);
      if (field.type === 'password') {
        field.type = 'text';
        icon.textContent = '🙈';
      } else {
        field.type = 'password';
        icon.textContent = '👁';
      }
    }

    // live constraint validation
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');

    const rules = {
      'c-length':  p => p.length >= 8,
      'c-upper':   p => /[A-Z]/.test(p),
      'c-lower':   p => /[a-z]/.test(p),
      'c-digit':   p => /[0-9]/.test(p),
      'c-special': p => /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(p),
    };

    passwordInput.addEventListener('input', function() {
      const val = this.value;
      let allMet = true;

      for (const [id, test] of Object.entries(rules)) {
        const li = document.getElementById(id);
        if (test(val)) {
          li.textContent = li.textContent.replace('*', '✓');
          li.classList.add('met');
        } else {
          li.textContent = li.textContent.replace('✓', '*');
          li.classList.remove('met');
          allMet = false;
        }
      }

      submitBtn.disabled = !allMet;
    });
  </script>

</body>
</html>
