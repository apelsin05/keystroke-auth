<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Inregistrare — Pasul 2</title>
  <link rel="stylesheet" href="../static/css/style.css"/>
</head>
<body>

<div class="page-center">
  <div class="form-card">

    <div class="card-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a5 5 0 1 0 5 5A5 5 0 0 0 12 2z"/><path d="M20 21a8 8 0 1 0-16 0"/>
      </svg>
    </div>

    <div class="card-title">Completeaza profilul</div>
    <div class="card-subtitle">Pasul 2 din 2 — Informatii personale</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-wrap">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/register/step2" style="display:flex;flex-direction:column;gap:1rem;width:100%">

      <!-- username -->
      <div class="field">
        <label for="username">Username <span style="color:var(--primary)">*</span></label>
        <div class="input-wrap">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/>
          </svg>
          <input type="text" id="username" name="username" placeholder="Introduceti username" required/>
        </div>
      </div>

      <!-- nume -->
      <div class="field">
        <label for="name">Nume</label>
        <div class="input-wrap">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="name" name="name" placeholder="Introduceti numele"/>
        </div>
      </div>

      <!-- prenume -->
      <div class="field">
        <label for="surname">Prenume</label>
        <div class="input-wrap">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="surname" name="surname" placeholder="Introduceti prenumele"/>
        </div>
      </div>

      <!-- telefon -->
      <div class="field">
        <label for="phone">Telefon</label>
        <div class="input-wrap">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.8 19.8 0 0 1 3.07 4.18 2 2 0 0 1 5.07 2h3a2 2 0 0 1 2 1.72 13 13 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 13 13 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          <input type="tel" id="phone" name="phone" placeholder="Introduceti numarul de telefon"/>
        </div>
      </div>

      <!-- security checkbox -->
      <label class="checkbox-field" for="security">
        <input type="checkbox" id="security" name="security"/>
        <span style="display:flex;align-items:center;gap:0.5rem">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          Activez masurile de siguranta
        </span>
      </label>

      <div style="display:flex;justify-content:flex-end;padding-top:0.25rem">
        <button type="submit" class="btn-primary">Finalizeaza →</button>
      </div>

    </form>
  </div>
</div>

</body>
</html>
