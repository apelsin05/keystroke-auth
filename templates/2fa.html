<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Verificare 2FA</title>
  <link rel="stylesheet" href="../static/css/2fa.css"/>
</head>
<body>

  <!-- checkbox drives the success slide-out animation -->
  <input id="submitted" type="checkbox" tabindex="-1">

  <div class="twofa-card">

    <div class="card-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>

    <h1>Verificare in doi pasi</h1>
    <p class="subtitle">Am trimis un cod de 6 cifre la adresa ta de email.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-wrap" style="width:100%">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form class="otp-form" method="POST" action="/2fa" id="twofa-form">

      <input type="number" min="0" max="9" maxlength="1" placeholder=" " id="n1" autofocus
             oninput="handleInput(this,'n2')">
      <input type="number" min="0" max="9" maxlength="1" placeholder=" " id="n2"
             oninput="handleInput(this,'n3')">
      <input type="number" min="0" max="9" maxlength="1" placeholder=" " id="n3"
             oninput="handleInput(this,'n4')">
      <input type="number" min="0" max="9" maxlength="1" placeholder=" " id="n4"
             oninput="handleInput(this,'n5')">
      <input type="number" min="0" max="9" maxlength="1" placeholder=" " id="n5"
             oninput="handleInput(this,'n6')">
      <input type="number" min="0" max="9" maxlength="1" placeholder=" " id="n6"
             oninput="handleInput(this,null)">

      <input type="hidden" id="code" name="code"/>

      <label class="submit" tabindex="0" for="submitted"
             onkeypress="triggerSubmit()"
             onclick="triggerSubmit()"></label>

      <span class="indicator"></span>

    </form>

  </div>

  <script>
    function handleInput(field, nextId) {
      if (field.value.length > 1) field.value = field.value.slice(-1);
      if (field.value && nextId) document.getElementById(nextId).focus();
    }

    function triggerSubmit() {
      const digits = ['n1','n2','n3','n4','n5','n6']
        .map(id => document.getElementById(id).value)
        .join('');
      document.getElementById('code').value = digits;
      setTimeout(function() {
        document.getElementById('twofa-form').submit();
      }, 500);
    }

    document.addEventListener('DOMContentLoaded', function() {
      ['n1','n2','n3','n4','n5','n6'].forEach(function(id) {
        document.getElementById(id).value = '';
      });
      document.getElementById('n1').focus();
    });
  </script>

</body>
</html>
